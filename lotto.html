<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행운의 로또 🍀</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d4edff;
      background-image:
        radial-gradient(circle at 15% 20%, #ffe5f4 0%, transparent 35%),
        radial-gradient(circle at 85% 10%, #e5f9e0 0%, transparent 30%),
        radial-gradient(circle at 70% 85%, #fff3d4 0%, transparent 35%),
        radial-gradient(circle at 10% 80%, #e8e5ff 0%, transparent 30%);
      min-height: 100vh;
      font-family: 'Jua', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px 60px;
    }

    .page {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 28px 24px 22px;
      text-align: center;
      box-shadow: 0 8px 0 #b8d8f5, 0 12px 24px rgba(0,0,0,0.08);
      border: 3px solid rgba(255,255,255,0.9);
      position: relative;
      overflow: hidden;
    }
    .header-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #ff9eb5, #ffda79, #a8edac, #88ccff, #c4aaff);
      border-radius: 28px 28px 0 0;
    }

    .emoji-row {
      font-size: 2.2rem;
      margin-bottom: 6px;
      display: flex;
      justify-content: center;
      gap: 8px;
      animation: bounce-icons 3s ease-in-out infinite;
    }
    @keyframes bounce-icons {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-size: 2.2rem;
      color: #3a3a6e;
      letter-spacing: 2px;
      line-height: 1.1;
      text-shadow: 3px 3px 0 rgba(136,204,255,0.5);
    }
    .sub {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #a0aec0;
      letter-spacing: 2px;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .ball-card {
      background: #fff8f0;
      border-radius: 28px;
      padding: 28px 20px;
      box-shadow: 0 8px 0 #f0d9b8, 0 12px 24px rgba(0,0,0,0.07);
      border: 3px solid rgba(255,255,255,0.9);
      text-align: center;
    }

    .balls-wrap {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 90px;
      align-items: center;
      margin-bottom: 6px;
    }

    .ball {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      position: relative;
      transform: scale(0) rotate(-30deg);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.34, 1.7, 0.64, 1), opacity 0.3s;
      cursor: default;
      user-select: none;
    }
    .ball.show { transform: scale(1) rotate(0deg); opacity: 1; }
    .ball:hover {
      transform: scale(1.15) rotate(-8deg) !important;
      transition: transform 0.2s cubic-bezier(0.34,1.7,0.64,1) !important;
    }
    .ball::before {
      content: '';
      position: absolute;
      top: 12%; left: 18%;
      width: 35%; height: 25%;
      background: rgba(255,255,255,0.55);
      border-radius: 50%;
      filter: blur(2px);
      pointer-events: none;
    }
    .ball::after {
      content: '';
      position: absolute;
      bottom: 12%; right: 14%;
      width: 18%; height: 12%;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      pointer-events: none;
    }

    .empty { background: #e8e8f0; box-shadow: 0 6px 0 #c8c8d8, inset 0 3px 6px rgba(255,255,255,0.6); }
    .c1 { background: #FF8C42; box-shadow: 0 8px 0 #d96b20, 0 10px 20px rgba(255,140,66,0.35), inset 0 3px 6px rgba(255,255,255,0.4); }
    .c2 { background: #4DBBFF; box-shadow: 0 8px 0 #1e97e8, 0 10px 20px rgba(77,187,255,0.35), inset 0 3px 6px rgba(255,255,255,0.4); }
    .c3 { background: #FF5E7E; box-shadow: 0 8px 0 #d93059, 0 10px 20px rgba(255,94,126,0.35), inset 0 3px 6px rgba(255,255,255,0.4); }
    .c4 { background: #B57BFF; box-shadow: 0 8px 0 #8c4ee0, 0 10px 20px rgba(181,123,255,0.35), inset 0 3px 6px rgba(255,255,255,0.4); }
    .c5 { background: #3DD9A0; box-shadow: 0 8px 0 #1daf7b, 0 10px 20px rgba(61,217,160,0.35), inset 0 3px 6px rgba(255,255,255,0.4); }

    .btn-wrap { margin-top: 18px; }
    .btn {
      background: linear-gradient(160deg, #ff7eb3, #ff5580);
      color: white;
      border: none;
      padding: 16px 44px;
      font-family: 'Jua', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 3px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 0 #c73060, 0 12px 24px rgba(255,85,128,0.3);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #c73060, 0 16px 28px rgba(255,85,128,0.35); }
    .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #c73060, 0 6px 14px rgba(255,85,128,0.25); }

    .message {
      margin-top: 14px;
      font-size: 1rem;
      color: #7c6fcd;
      min-height: 1.4rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .message.show { opacity: 1; transform: translateY(0); }

    .history-card {
      background: #f0fff8;
      border-radius: 28px;
      padding: 22px 20px;
      box-shadow: 0 8px 0 #b8ecd8, 0 12px 24px rgba(0,0,0,0.07);
      border: 3px solid rgba(255,255,255,0.9);
    }

    .history-title {
      font-size: 1rem;
      color: #5a8a72;
      letter-spacing: 2px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .count-badge {
      background: #3DD9A0;
      color: white;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 20px;
      box-shadow: 0 3px 0 #1daf7b;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .history-list::-webkit-scrollbar { width: 6px; }
    .history-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: #b0dcc8; border-radius: 4px; }

    .history-item {
      background: white;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 0 #d8eedf, 0 6px 12px rgba(0,0,0,0.04);
      animation: popIn 0.35s cubic-bezier(0.34,1.7,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.85) translateY(-8px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .hist-no {
      font-size: 0.7rem;
      color: #b0bcc8;
      width: 22px;
      flex-shrink: 0;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .mini-ball {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: white;
      flex-shrink: 0;
      position: relative;
    }
    .mini-ball::before {
      content: '';
      position: absolute;
      top: 10%; left: 18%;
      width: 34%; height: 24%;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      filter: blur(1px);
    }
    .m1 { background: #FF8C42; box-shadow: 0 3px 0 #d96b20; }
    .m2 { background: #4DBBFF; box-shadow: 0 3px 0 #1e97e8; }
    .m3 { background: #FF5E7E; box-shadow: 0 3px 0 #d93059; }
    .m4 { background: #B57BFF; box-shadow: 0 3px 0 #8c4ee0; }
    .m5 { background: #3DD9A0; box-shadow: 0 3px 0 #1daf7b; }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: confettiFall 1.6s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(350px) rotate(900deg) scale(0.3); }
    }

    .empty-history {
      text-align: center;
      color: #b0c8be;
      font-size: 0.9rem;
      padding: 20px 0;
    }

    .download-wrap {
      display: none;
      gap: 10px;
      margin-top: 14px;
      justify-content: center;
    }
    .download-wrap.visible { display: flex; }

    .dl-btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 12px 0;
      font-family: 'Jua', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dl-btn:hover  { transform: translateY(-2px); }
    .dl-btn:active { transform: translateY(3px); }

    .dl-txt {
      background: #fffbe6;
      color: #a07820;
      box-shadow: 0 5px 0 #e6c84a, 0 8px 16px rgba(230,200,74,0.25);
    }
    .dl-txt:hover  { box-shadow: 0 7px 0 #e6c84a, 0 10px 20px rgba(230,200,74,0.3); }
    .dl-txt:active { box-shadow: 0 2px 0 #e6c84a; }

    .dl-csv {
      background: #e8f5e9;
      color: #2e7d32;
      box-shadow: 0 5px 0 #81c784, 0 8px 16px rgba(129,199,132,0.25);
    }
    .dl-csv:hover  { box-shadow: 0 7px 0 #81c784, 0 10px 20px rgba(129,199,132,0.3); }
    .dl-csv:active { box-shadow: 0 2px 0 #81c784; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #3a3a6e;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(58,58,110,0.35);
      transition: transform 0.35s cubic-bezier(0.34,1.5,0.64,1), opacity 0.3s;
      opacity: 0;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<div class="page">

  <div class="header-card">
    <div class="emoji-row">🍀🎰✨</div>
    <h1>행운의 로또</h1>
    <p class="sub">LUCKY NUMBER PICKER</p>
  </div>

  <div class="ball-card">
    <div class="balls-wrap" id="balls">
      <div class="ball empty" id="b1"></div>
      <div class="ball empty" id="b2"></div>
      <div class="ball empty" id="b3"></div>
      <div class="ball empty" id="b4"></div>
      <div class="ball empty" id="b5"></div>
      <div class="ball empty" id="b6"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="mainBtn" onclick="generate()">🎲 번호 추첨!</button>
    </div>
    <p class="message" id="msg"></p>
  </div>

  <div class="history-card">
    <div class="history-title">
      📋 최근 추첨 기록
      <span class="count-badge" id="count-badge">0 / 10</span>
    </div>
    <div class="history-list" id="history">
      <div class="empty-history" id="empty-msg">아직 추첨 기록이 없어요 🌱</div>
    </div>
    <div class="download-wrap" id="download-wrap">
      <button class="dl-btn dl-txt" onclick="downloadTXT()">📄 TXT 저장</button>
      <button class="dl-btn dl-csv" onclick="downloadCSV()">📊 CSV 저장</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  const messages = [
    '🎉 이번 주 당첨은 바로 당신!',
    '✨ 행운이 가득합니다!',
    '💫 대박의 기운이 느껴져요!',
    '🌟 1등 당첨을 기원합니다!',
    '🍀 오늘은 특별한 날이 될 거예요!',
    '🔥 이 번호, 느낌이 좋아요!',
    '🌈 행운의 여신이 미소짓고 있어요!',
    '🎊 당첨 예감이 팍팍 옵니다!',
    '💖 오늘 복권 사러 가세요!',
    '🏆 이번엔 진짜인 것 같아요!'
  ];
  const confettiColors = ['#FF8C42','#4DBBFF','#FF5E7E','#B57BFF','#3DD9A0','#FFD700','#ff7eb3'];

  function getClass(n) {
    if (n <= 10) return 'c1';
    if (n <= 20) return 'c2';
    if (n <= 30) return 'c3';
    if (n <= 40) return 'c4';
    return 'c5';
  }
  function getMiniClass(n) {
    if (n <= 10) return 'm1';
    if (n <= 20) return 'm2';
    if (n <= 30) return 'm3';
    if (n <= 40) return 'm4';
    return 'm5';
  }

  function pick6() {
    const pool = Array.from({length:45}, (_,i)=>i+1);
    const res = [];
    while (res.length < 6) {
      const i = Math.floor(Math.random() * pool.length);
      res.push(pool.splice(i, 1)[0]);
    }
    return res.sort((a,b)=>a-b);
  }

  function spawnConfetti() {
    const btn = document.getElementById('mainBtn');
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top;
    for (let i = 0; i < 32; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 7 + Math.random() * 9;
      el.style.cssText = `
        left:${cx + (Math.random()-0.5)*140}px;
        top:${cy}px;
        width:${size}px;height:${size}px;
        background:${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
        animation-duration:${0.9+Math.random()*0.9}s;
        animation-delay:${Math.random()*0.25}s;
        border-radius:${Math.random()>0.5?'50%':'3px'};
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 2400);
    }
  }

  let history = [];
  let running = false;

  function generate() {
    if (running) return;
    running = true;

    const balls = Array.from({length:6}, (_,i)=>document.getElementById(`b${i+1}`));
    const msgEl = document.getElementById('msg');

    balls.forEach(b => { b.className = 'ball empty'; b.textContent = ''; });
    msgEl.classList.remove('show');

    const nums = pick6();

    nums.forEach((n, i) => {
      setTimeout(() => {
        const b = balls[i];
        b.className = `ball ${getClass(n)} show`;
        b.textContent = n;
        if (i === 5) {
          spawnConfetti();
          msgEl.textContent = messages[Math.floor(Math.random() * messages.length)];
          msgEl.classList.add('show');
          addHistory(nums);
          running = false;
        }
      }, i * 160);
    });
  }

  function addHistory(nums) {
    history.unshift(nums);
    if (history.length > 10) history.pop();

    document.getElementById('count-badge').textContent = `${history.length} / 10`;

    const el = document.getElementById('history');
    const emptyMsg = document.getElementById('empty-msg');
    if (emptyMsg) emptyMsg.remove();

    el.innerHTML = '';
    history.forEach((row, idx) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const no = document.createElement('div');
      no.className = 'hist-no';
      no.textContent = `#${idx+1}`;
      item.appendChild(no);
      row.forEach(n => {
        const mb = document.createElement('div');
        mb.className = `mini-ball ${getMiniClass(n)}`;
        mb.textContent = n;
        item.appendChild(mb);
      });
      el.appendChild(item);
    });

    document.getElementById('download-wrap').classList.add('visible');
  }

  function getNow() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function downloadTXT() {
    if (!history.length) return;
    const now = getNow();
    let txt = '🍀 행운의 로또 추첨 기록\n';
    txt += `📅 저장일시: ${now}\n`;
    txt += '─'.repeat(30) + '\n\n';
    history.forEach((row, i) => {
      txt += `#${String(i+1).padStart(2,'0')}  ${row.map(n=>String(n).padStart(2,' ')).join('  -  ')}\n`;
    });
    txt += `\n${'─'.repeat(30)}\n총 ${history.length}회 추첨`;
    const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `로또번호_${now.replace(/[: ]/g,'-')}.txt`;
    a.click();
    showToast('📄 TXT 파일이 저장되었어요!');
  }

  function downloadCSV() {
    if (!history.length) return;
    const now = getNow();
    let csv = '\uFEFF';
    csv += '순번,1번,2번,3번,4번,5번,6번\n';
    history.forEach((row, i) => {
      csv += `${i+1},${row.join(',')}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `로또번호_${now.replace(/[: ]/g,'-')}.csv`;
    a.click();
    showToast('📊 CSV 파일이 저장되었어요!');
  }

  window.onload = () => {
    const balls = Array.from({length:6}, (_,i)=>document.getElementById(`b${i+1}`));
    balls.forEach((b, i) => {
      b.style.opacity = '0';
      b.style.transform = 'scale(0)';
      setTimeout(() => {
        b.style.transition = 'transform 0.4s cubic-bezier(0.34,1.7,0.64,1), opacity 0.3s';
        b.style.transform = 'scale(1)';
        b.style.opacity = '1';
      }, i * 80 + 100);
    });
  };
</script>
</body>
</html>
